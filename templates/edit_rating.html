{% extends "base.html" %}
{% block title %}Edit Rating{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-1">✏️ Edit Your Rating</h4>
        <p class="text-muted mb-4">
          Book: <a href="/book/{{ rating.book_id }}"><strong>{{ rating.book.title }}</strong></a>
        </p>
        <form method="POST">
          {{ form.hidden_tag() }}
          <div class="mb-3">
            {{ form.score(class="form-select") }}
          </div>
          {{ form.submit(class="btn btn-warning w-100") }}
        </form>
        <a href="/book/{{ rating.book_id }}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
